    - id: bs-ki-2.3
      title: Beschriftung der Haltekante
      parts:
      - name: statement
        prose: 'Damit sich die Kundschaft innerhalb einer Haltestelle orientieren kann, müssen die einzelnen

          Haltekanten beschriftet werden. Die Beschriftung der Haltekanten ist ein Element der räumlichen

          Orientierung (siehe auch Abschnitt 2.4). So erkennt die Kundschaft, dass sie am richtigen Ort auf

          ihre Fahrt wartet. Die Art der Beschriftung ist abhängig von der Verkehrsmittelkategorie:


          •  Bei Bahn, Zahnradbahn, Metro und Schiff erfolgt sie mit der Beschriftung des Gleises oder des

          Stegs (siehe Abschnitt 3.10). Ausgenommen sind Haltestellen mit nur einer Haltekante, hier

          reicht die Beschriftung mit dem Haltestellennamen (siehe Abschnitt 2.2).


          •  Bei Bus und Tram wird die Liniennummer (siehe Abschnitt 3.6) und das Ziel (siehe Abschnitt'
      props:
