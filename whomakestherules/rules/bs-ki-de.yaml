        - id: bs-ki-2.5
          title: "Ereignisinformationen"
          parts:
            - name: statement
              prose: |
                Vorfälle, welche Abweichungen vom geplanten Betrieb zur Folge haben, werden als Ereignisse
                bezeichnet. Ereignisse können geplant (z.B. Baustellen) oder ungeplant (z.B. Störungen,
                insbesondere Unfälle oder Naturereignisse) sein. Die Kundschaft ist im Ereignisfall nur dann
                handlungsfähig, wenn sie die nötigen Informationen über das Ereignis erhält. Dazu gehören z.B.
                alternative Reisemöglichkeiten, Dauer oder Auswirkungen.
            - name: guidance
              title: "Spezifisch an der Haltestelle"
              prose: |
                Über geplante Ereignisse muss die Kundschaft an der Haltestelle mindestens optisch informiert
                werden (siehe Abschnitt 7.3). Bei geplanten Ereignissen, die eine längere Zeit andauern, kann auf
                die akustische Ausgabe verzichtet werden, um den Lärmschutz von Anwohnenden zu
                gewährleisten.

                Bei ungeplanten Ereignissen informieren die TU im Rahmen ihrer Möglichkeiten (Prozesse,
                Systeme). Das Ziel ist, möglichst rasch eine möglichst grosse Kundschaft zu erreichen. Die
                Betriebsabwicklung und Störungsbehebung sind insbesondere bei knappen Ressourcen jedoch
                vorrangig zu gewährleisten.
            - name: guidance
              title: "Spezifisch am und im Fahrzeug – Fahrzeug innen"
              prose: |
                Wenn eine Fahrtverlaufsanzeige vorhanden ist, muss die Ereignisinformation angezeigt werden.

                Die minimale Schriftgrösse für die Überschrift (z.B. «Störung») beträgt 35 mm.
          props:
