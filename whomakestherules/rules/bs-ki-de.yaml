  - id: bs-ki-3
    title: Fahrtbezogene Inhalte der Kundeninformation
    groups:
    - id: bs-ki-3.1
      title: Übersicht aller Fahrten der Haltestelle
      controls:
      - id: bs-ki-3.4-uebersicht
        title: Fahrplanzeit (Übersicht aller Fahrten der Haltestelle  ("Fahrplan"))
        parts:
        - name: statement
          prose: 'Jede Fahrt muss im Sollfahrplan über eine geplante Abfahrtszeit oder Betriebszeit verfügen.

            Werden Ankünfte dargestellt, ist die Ankunftszeit anzugeben.


            Die Darstellung von Uhrzeiten ist zu berücksichtigen (siehe Abschnitt 6.5).


            Beispiele


            Abfahrtszeit


            13:37 / 5’


            Betriebszeit


            von 08:30 bis 16:30 durchgehend


            Hinweise zur Verwendung von Abfahrtszeiten im Fahrplan sowie in Betriebszeiten sind im

            Abschnitt 6.6 aufgeführt.'
