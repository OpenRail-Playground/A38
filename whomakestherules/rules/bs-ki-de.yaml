    - id: bs-ki-2.9
      title: Passagierrechte
      parts:
      - name: statement
        prose: 'Die Rechte der Kundschaft im öV sind im Personenbeförderungsgesetz und seiner Verordnung

          verankert und müssen von den TU eingehalten werden. Dabei ist insbesondere die

          Informationspflicht zu berücksichtigen.


          Die Kundschaft ist sowohl aktiv als auch passiv über ihre Rechte zu informieren. Passiv bedeutet,

          dass der Link zur nationalen Seite zu den Fahrgastrechten (swisspass.ch/fahrgastrechte) auf der

          Website der TU und – falls eine eigene App betrieben wird – in der App einfach auffindbar und

          verlinkt sein muss.


          Falls eine Fahrt mindestens 60 Minuten verspätet ist, muss im betroffenen Fahrzeug aktiv auf die

          Fahrgastrechte aufmerksam gemacht werden (z.B. ein Hinweis auf: swisspass.ch/fahrgastrechte):


          •  Akustisch: Kommunikation über die vorhandenen akustischen Kundeninformationssysteme


          oder über anwesendes Fahr- / Dienstpersonal oder Kundenbegleiter.


          •  Optisch: Kommunikation über die im Fahrzeug, dem Schiff oder an der Berg-/Talstation


          vorhandenen optischen Kundeninformationssysteme.




          3.


          Fahrtbezogene Inhalte der Kundeninformation


          Neben den allgemeinen Informationen benötigt die Kundschaft insbesondere Angaben zu ihrer

          konkreten Fahrt. Diese können in zwei Formen bereitgestellt werden:


          •  Als publizierter Fahrplan, z. B. in Form einer Abfahrtstabelle oder eines Abfahrtsplakats (siehe


          Abschnitt 3.1).


          •  Als Echtzeitinformationen zu bevorstehenden Fahrten (siehe Abschnitte 3.2 und 3.3). Diese


          können z. B. folgendermassen dargestellt werden:


          o  als einzelne Fahrt (z.B. Informationen am/im Fahrzeug, Perronanzeiger im Bereich Bahn)

          o  als in nächster Zeit verkehrende Fahrten (z.B. Haltekantenanzeiger oder Abfahrtsmonitor


          an der Haltestelle, Anschlussdurchsage im Fahrzeug)'
