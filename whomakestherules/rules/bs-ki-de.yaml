      - id: bs-ki-3.10-anschluss
        title: Abfahrtsort soll und real (Informationen zu Anschlüssen)
        parts:
        - name: statement
          prose: 'Die Kundschaft muss sich innerhalb der Haltestelle über die verschiedenen Abfahrtsorte (sofern

            mehrere vorhanden sind) orientieren können. Dazu werden die Abfahrtsorte einheitlich benannt

            und durchnummeriert bzw. durchbuchstabiert. Die Bezeichnungen müssen über alle Kanäle und

            Touchpoints einheitlich verwendet werden.




            Massgebend ist die jeweilige Verkehrsmittelkategorie:


            Verkehrsmittelkategorie


            Sprache


            Bezeichnung


            DE


            FR


            IT


            EN


            Zug / Zahnradbahn / Metro   Gleis


            Bus / Tram


            Schiff


            Seilbahn / Gondelbahn /

            Sessellift / Standseilbahn


            Kante


            Steg


            Perron


            voie


            quai


            quai


            quai


            binario


            platform


            1 bis 99


            corsia


            pontile


            stop


            pier


            A bis Z


            1 bis 99


            banchina


            platform


            1 bis 99


            Auf das Nummerieren bzw. Durchbuchstabieren kann unter folgenden Bedingungen verzichtet

            werden:


            •  Bei Bahn- und Schiff-Haltestellen, wenn nur ein Gleis oder ein Steg vorhanden ist.

            •  Bei Bus-, Tram- und Metro-Haltestellen, wenn alle folgenden Punkte erfüllt sind:


            o  Maximal 2 Kanten

            o  Die Kanten liegen in Sichtdistanz nahe beieinander.

            o  Es besteht keine anderweitige Verwechslungsgefahr.

            •  Bei Seilbahnen, wenn das Ziel der Linie angegeben wird.


            Wird auf eine Nummerierung / Buchstabierung verzichtet, ist dies auf allen Kanälen umzusetzen,

            insbesondere dürfen auch keine Daten (siehe Abschnitt 8.4.6) eingeliefert werden.


            Bei Seilbahnen befindet sich das Perron und damit dessen Beschriftung physisch bei der

            Zutrittskontrolle (sofern vorhanden) und nicht beim Übergang in die Kabine, um der Kundschaft

            eine rechtzeitige Orientierung zu ermöglichen.'
