    - id: bs-ki-2.8
      title: Kontakt zur TU
      parts:
      - name: statement
        prose: 'Damit die Kundschaft weiss, wohin sie sich bei Unsicherheit oder Fragen wenden kann, muss ein

          entsprechender Kontakt angegeben werden. Dies kann entweder die TU sein, welche die Linie

          betreibt oder eine andere TU, welche diese Dienstleistung übernimmt.


          Pflicht-Angaben:


          •  Name TU oder Tarif- bzw. Verkehrsverbund

          •  Telefonnummer


          Optionale Kontaktkanäle:


          •  E-Mail-Adresse

          •  Webseite, gegebenenfalls direkt zu Kontaktangaben bzw. Kontaktformular


          Wenn die Telefonnummer zu Bürozeiten nicht bedient ist, muss einer der optionalen Kontaktkanäle

          angegeben werden.'
