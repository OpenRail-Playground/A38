      - id: bs-ki-3.6-fahrt
        title: Liniennummer (Informationen zur Fahrt)
        parts:
        - name: statement
          prose: 'Die Liniennummer ist die gegenüber der Kundschaft angezeigte Identifikation einer Linie. Die

            Liniennummer muss innerhalb einer Region pro Verkehrsmittelkategoriegruppe gemäss 3.5

            eindeutig sein. Im Fernverkehr muss diese innerhalb der ganzen Schweiz eindeutig sein. Zwei

            gleiche Liniennummern benachbarter Regionen bzw. Verkehrsmittelkategoriegruppen gemäss 3.5

            dürfen sich nicht berühren. Die Regionen sind in den Ausführungsbestimmungen geregelt.


            Die Liniennummer ist je Verkehrsmittelkategorie unterschiedlich aufgebaut (siehe Abschnitt 3.6.3).'
        - name: guidance
          title: AB BS-KI 3.6 – Definition der Linie
          prose: 'Die folgenden Grundsätze gelten:

            •  Auf der Linie darf es maximal drei unterschiedliche Fahrtvarianten geben.

            •  Pro Fahrtvariante müssen mindestens 80% der Via der Stammstrecke bedient werden.

            •  Fehlende Via aufgrund von Teilstrecken werden nicht mitgerechnet.

            •  Unterschiedliche Reihenfolgen innerhalb der Nachbarhaltestellen (z.B. Halt 7 wird zu 8 und Halt 8 wird zu 7)
            werden nicht mitgerechnet.

            •  Früh- und Spätkurse dürfen darüber hinaus maximal 20% zusätzliche Via (zur Stammstrecke) anfahren, ohne dass
            sie als separate Fahrvariante gezählt werden.

            •  Verstärkungsfahrten (z.B. während der HVZ oder für Schülerverkehr) dürfen von der Haltepolitik abweichen und
            zählen nicht zu den drei Fahrtvarianten.

            •  Ausfransungen (Y-Linien) sind nicht erlaubt.

            •  Einzelfahrten, welche linienübergreifend fahren (z.B. Pässe Rundfahrten) werden als eigenständige Linie definiert.

            •  Ergänzende integrale Angebote (z.B. Skibus) sind eigenständige Linie.'
        - name: guidance
          title: AB BS-KI 3.6 – Änderung der Liniennummer
          prose: Grundsätzlich gelten die Liniennummer und Linienbezeichnung, wie sie in den Konzessionen verfügt sind. Wenn
            es zur besseren Kommunikation gegenüber den Kunden erforderlich ist, können Liniennummern und Linienbezeichnungen
            in Absprache mit dem BAV geändert werden, ohne dass eine Konzessionsänderung notwendig ist (Art. 17 VPB). Voraussetzung
            ist, dass der Bestand der Linie weiterhin der erteilten Konzession entspricht. Diesbezügliche Anfragen sind an
            das BAV zu richten. Die Änderung erfolgt jeweils zum Fahrplanwechsel.
        - name: guidance
          title: AB BS-KI 3.6 – CH-Liniennummer (CHLNR)
          prose: 'Die CH-Liniennummer setzt sich wie folgt zusammen:

            <Präfix>.<Region>.<Liniennummer>:<Attribut>


            Präfix – charakterisiert die Verkehrsart:

            b = Bahn, Zahnradbahn und deren Ersatzverkehr

            c = Autoverlad (ohne Transport von Fussgänger)

            n = Schiff

            r = Bus, Tram und Metro, sowie Schiff, Seilbahnen und Zahnradbahnen, wenn diese in das städtische Liniennetz integriert
            sind

