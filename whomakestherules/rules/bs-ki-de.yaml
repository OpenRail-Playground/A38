      - id: bs-ki-3.16.1-fahrt
        title: Verspätung (Informationen zur Fahrt)
        parts:
        - name: statement
          prose: 'Die Ausgabe von Verspätungen gibt der Kundschaft eine gewisse Sicherheit, dass ein nicht

            planmässig verkehrendes Fahrzeug zu einem bestimmten Zeitpunkt doch noch eintreffen wird.


            Die Ausgabe von Verspätungen unterscheidet sich bei den unterschiedlichen Betriebsarten (siehe

            Abschnitt 6.6) und Verkehrsmittelkategorien (siehe Abschnitt 3.5):


            In der zeitbasierten Darstellung (gemäss 6.6.1) wird die Abweichung von der Soll-Zeit

            kommuniziert.


            Bei der Intervalldarstellung (gemäss 6.6.1), wird eine allfällige Verspätung in die Minutenzahl

            integriert.


            Der Schwellenwert von Verspätungen wird zwischen den Verkehrsmittelkategorien unterschieden:


            •  Tram/Bus:

            •  Alle anderen Verkehrsmittelkategorien:   3 Minuten


            1 Minute




            Falls keine Prognose erstellt werden kann, z.B. weil ein Fahrzeug im Stau steht oder weil nicht

            bekannt ist, wie lange eine Störung andauert, wird ein entsprechender Hinweis kommuniziert.


            Verkehrsmittel, welche als Fahrplanzeit eine Betriebszeit (siehe 6.6.2) haben, können nicht

            verspätet sein.'
