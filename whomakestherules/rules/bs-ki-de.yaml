      controls:
        - id: bs-ki-2.1
          title: "Aktuelle Uhrzeit"
          parts:
            - name: statement
              prose: |
                Bei Haltestellen mit weniger als 800 Ein- und Aussteigern pro Tag kann auf die Angabe der
                Uhrzeit verzichtet werden.

                Die aktuelle Uhrzeit ist für die Kundschaft ein zentrales Element zur Orientierung. Sie kann analog
                oder digital dargestellt werden (Informationen zur Darstellung siehe Abschnitt 6.5).
            - name: guidance
              title: "Spezifisch am und im Fahrzeug – Fahrzeug innen"
              prose: |
                Nur wenn im Fahrzeug eine Linienverlaufsanzeige vorhanden ist, muss die aktuelle Uhrzeit
                angezeigt werden.
          props:
