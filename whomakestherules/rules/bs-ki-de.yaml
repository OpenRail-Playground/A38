    - id: bs-ki-2.4
      title: Wegweisung
      parts:
      - name: statement
        prose: 'Die Wegweisung erfolgt mit Signaletik und Piktogrammen (siehe Abschnitt 6.10). Gemeinsam mit

          dem Namen der Haltestelle (siehe Abschnitt 2.2) und der Beschriftung der Haltekante (siehe

          Abschnitt 2.3) wird die räumliche Orientierung für die Kundschaft sichergestellt. Die Wegweisung

          gilt auch im öffentlichen Bereich zwischen und zu den einzelnen Haltestellen und zu

          Haltestellen/Haltekanten von anderen Verkehrsmitteln.




          Dabei wird folgende Priorisierung angewendet:


          Priorität 1


          Positionsbestätigung, damit die Kundschaft weiss, wo sie sich genau

          befinden:


          •  Haltestellenname (zwingend)

          •  Bezeichnung Kante, Gleis, Steg (zwingend, falls mehr als 1 Gleis / mehr


          als 2 Kanten)


          •  Unterteilung der Gleise in Sektoren (optional)


          Wegweisung (optional):


          •  Ausschilderung zu potenziellen Abfahrtsorten inklusive Ersatzverkehr


          (Verkehrsmittel, Haltekante)


          Priorität 2


          Reiserelevante Informationen:


          •  Wegweisung zu Schalter, Billettautomaten, Schliessfächer, Toiletten,


          Bistro usw.


          Informationen zur Anschlussmobilität:


          •  Auto-, Velovermietung, Taxi usw.


          Umgebungshinweise:


          •  Ausgänge, Point of Interest usw.


          Priorität 3


          Informationen ohne Relevanz für die Reise:


          •  Einkaufsmöglichkeiten, Geldautomaten usw.'
