          prose: 'Die Beförderungshinweise dienen dazu, spezielle Bedingungen für die betreffende Fahrt zu

            kommunizieren. Sie werden immer dann verwendet, wenn die Kundschaft vorgängig eine

            Handlung vornehmen resp. ein zusätzliches Produkt kaufen muss, um die Fahrt antreten zu

            können. Beispiele sind eine Reservierungs- oder Zuschlagspflicht oder Einschränkungen im

            Veloselbstverlad (Veloselbstverlad reservierungspflichtig, kein Veloselbstverlad usw.).


