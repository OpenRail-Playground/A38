      - id: bs-ki-3.13-uebersicht
        title: Angebotshinweise (Übersicht aller Fahrten der Haltestelle  ("Fahrplan"))
        parts:
        - name: statement
          prose: 'Mit Angebotshinweisen (auch Service-Attribute genannt) werden der Kundschaft auf einer

            bestimmten Fahrt bestehende Komforteigenschaften angegeben. Dies können zum Beispiel

            Verpflegungsangebote, Ruhezonen, Panoramawagen oder der Hinweis sein, dass der Kurs durch

            ein Dampfschiff geführt wird.


            Die Liste hints.csv zeigt alle aktuellen Angebotshinweise auf.


            Angebotshinweise stehen stets in allen Sprachen gemäss Abschnitt 6.2 zur Verfügung und

            besitzen eine Abkürzung. Die Abkürzungen müssen in einer Legende erklärt werden. Teilweise

            können sie zusätzlich mit einem Symbol dargestellt werden.


            Fahrzeugattribute wie Rollstuhl- oder Vorzugsplätze oder Bereiche für Velo oder Kinderwagen

            gelten ebenfalls als Angebotshinweise. Diese Fahrzeugattribute werden nicht als Daten eingeliefert

            und sind in der Liste hints.csv nicht aufgeführt.


            Die Fahrzeugklasse ist ebenfalls ein Fahrzeugattribut. Zur Vereinfachung wird davon

            ausgegangen, dass in Zügen und Schiffen 1. und 2. Klasse vorhanden sind. Abweichungen davon

            werden als «nur 2. Klasse» eingeliefert und kommuniziert.


            In allen anderen Verkehrsmitteln ist nur die 2. Klasse vorhanden, dies wird nicht kommuniziert.'
