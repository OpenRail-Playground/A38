          prose: 'Die Verbindlichkeit v / e in der Matrix bezieht sich nicht darauf, dass ein Marketingname gewählt

            werden soll, sondern darauf, ob dieser (falls vorhanden) in den entsprechenden Kanälen

            dargestellt werden soll.


            Der Marketingname dient der generellen Vermarktung des öffentlichen Verkehrs im Freizeit- und

            Ausflugsbereich (z.B. Glacier Express oder Treno Gottardo) oder für spezielle Angebote, welche

            im Zusammenhang mit fahrplanmässigen Fahrten angeboten werden, z.B. Mittagsschiff.


            Marketingnamen gelten als Zusatzinformation und sind somit nicht Teil des Erkennungsschlüssels

            (siehe Abschnitt 6.1). In optischen Publikationskanälen (z.B. Online-Fahrplan, Abfahrtsplakat,

            Smarte Stele) werden Marketingnamen aufgeführt, sofern genügend Platz vorhanden ist. In

            akustischen Publikationskanälen wird auf die Ausgabe von Marketingnamen mehrheitlich

            verzichtet, um die Dauer der Durchsagen zu begrenzen.'
