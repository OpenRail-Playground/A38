      - id: bs-ki-3.11-fahrt
        title: Formation (Informationen zur Fahrt)
        parts:
        - name: statement
          prose: 'Formationsanzeigen werden nur bei der Verkehrsmittelkategorie «Bahn» genutzt. Die Anzeige der

            Formation hilft der Kundschaft bei langen Zügen, sich schon vor Einfahrt am Gleis zu orientieren.



            Daher soll eine Formationsanzeige nach Möglichkeit gemeinsam mit der Sektorierung des Gleises

            verwendet werden.


            Die Formationsanzeige zeigt der Kundschaft die folgenden Informationen an:


            •  Die Länge des zu erwartenden Zugs und dessen Platzierung am Gleis

            •  Angaben zur Fahrzeugklasse der einzelnen Wagen

            •  Falls sinnvoll: Angebotshinweise (gemäss Abschnitt 3.13), welche nur in bestimmten Wagen


            auffindbar sind (Fahrzeugattribute), z.B. Standort des Restaurants


            •  Wagennummer (falls Sitzplatzreservierungen möglich sind)

            •  Falls vorhanden, sind spezielle Rollstuhlplätze mittels eines Rollstuhlsymbols zwingend


            aufzuführen. Dies ist unabhängig vom BfR-Status und ergänzen diesen.'
