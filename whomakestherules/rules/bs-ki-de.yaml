    - id: bs-ki-2.2
      title: Name der Haltestelle
      parts:
      - name: statement
        prose: 'Die Beschriftung der Haltestelle mit ihrem Namen (gemäss Abschnitt 6.4) ist das Grundelement

          der räumlichen Orientierung (siehe auch Abschnitt 2.4). Sie dient sowohl der Bestätigung, dass

          sich die Haltestelle tatsächlich an diesem Ort befindet, als auch der Bestätigung, an der richtigen

          Haltestelle zu sein.


          Es ist sicherzustellen, dass die Beschriftung beim Zugang zur Haltestelle und, soweit sinnvoll, aus

          dem Fahrzeug heraus ersichtlich ist. Der Name der Haltestelle kann dazu einmal oder mehrfach

          angebracht werden.'
