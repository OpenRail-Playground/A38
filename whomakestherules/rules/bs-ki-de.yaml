    - id: bs-ki-2.5
      title: Ereignisinformationen
      parts:
      - name: statement
        prose: 'Vorfälle, welche Abweichungen vom geplanten Betrieb zur Folge haben, werden als Ereignisse

          bezeichnet. Ereignisse können geplant (z.B. Baustellen) oder ungeplant (z.B. Störungen,

          insbesondere Unfälle oder Naturereignisse) sein. Die Kundschaft ist im Ereignisfall nur dann

          handlungsfähig, wenn sie die nötigen Informationen über das Ereignis erhält. Dazu gehören z.B.

          alternative Reisemöglichkeiten, Dauer oder Auswirkungen.




          Meldungselemente


          Die Ereignismeldung hat folgende Meldungselemente, wobei situativ nicht alle zum Einsatz

          kommen:


          Meldungselement  Beispiel 1


          Überschrift


          Störung


          Titel (Schlagzeile)


          Der Tram- und Busverkehr

          zwischen Zürich, Tiefenbrunnen

          und Bellevue ist unterbrochen.


          Beispiel 2


          Störung behoben


          Der Unterbruch des Tram- und

          Busverkehrs zwischen Zürich,

          Tiefenbrunnen und Bellevue ist

          aufgehoben.


          Grund


          Dauer


          Information


          Auswirkungen


          Empfehlung


          Der Grund dafür ist ein

          Wasserrohrbruch.


          Die Dauer der Einschränkung ist

          unbestimmt.


          Betroffen sind die Linien 2, 4, 912

          und 916.


          Die Linien 2, 4, 912 und 916 fallen

          zwischen Zürich, Tiefenbrunnen

          und Bellevue aus.


          Reisende zwischen Zürich,

          Tiefenbrunnen und Bellevue

          benützen die Züge.


          Bemerkung


          Weitere Informationen erhalten Sie

          unter www.zvv.ch/fahrplan.


          Vereinzelt sind weiterhin

          Verspätungen möglich.


          Die Aufzählung ist weder als Reihenfolge noch Priorisierung zu verstehen.


          Es ist darauf zu achten, der Kundschaft möglichst alle relevanten Informationen mitzugeben.

          Insbesondere auf die Elemente «Grund», «Dauer», «Auswirkung» und «Empfehlung» ist nur in

          Ausnahmefällen (z.B. Endmeldung einer Störung) zu verzichten. Der Titel (Schlagzeile) ist für jede

          Meldung verbindlich.


          Standardsätze


          Die Ausführungsbestimmungen regeln die Details inklusive der zu verwendenden Standardsätze

          bezüglich Ereignismeldungen.


          Absprache zwischen TU im gleichen Angebotsbereich


          Falls verschiedene TU zum gleichen Ereignis eigene Meldungen erfassen, dürfen sich diese nicht

          widersprechen. Es liegt in der Verantwortung der betroffenen TU und Verbünde, sich bei

          überschneidenden Angebotsbereichen vorgängig über das kommunikative Vorgehen im

          Ereignisfall abzusprechen. Sich überschneidende Angebotsbereiche entstehen beispielsweise

          dann, wenn mehr als ein TU die gleiche Strecke befährt.



          Geplante Ereignisse


          Bei geplanten Ereignissen ist der Fahrplan anzupassen und angepasst einzuliefern (siehe auch

          Abschnitt 8.4.1, die Fristen gemäss FPV sind zu beachten). Um die Kundschaft über die

          vorgenommenen Änderungen und deren Umstände (Ursache, Dauer usw.) zu informieren,

          kommen ergänzend Ereignismeldungen zum Einsatz.


          Lang andauernde ungeplante Ereignisse


          Bei ungeplanten Ereignissen, welche lang (Tage oder Wochen) andauern, ist neben der

          Ereignismeldung der Fahrplan ebenfalls anzupassen, dies so, dass eine möglichst kleine Lücke

          zwischen Soll-Fahrplan und Echtzeitdaten entsteht.'
