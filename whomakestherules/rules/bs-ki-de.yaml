      - id: bs-ki-3.8-fahrt
        title: Via (Informationen zur Fahrt)
        parts:
        - name: statement
          prose: 'Die Angabe von Via gibt der Kundschaft Hinweise zum Fahrtverlauf. Zusätzlich vermitteln sie

            Sicherheit, die richtige Fahrt zu nehmen und helfen bei der geografischen Orientierung.


            Via werden in Fahrtrichtung von links nach rechts bzw. von oben nach unten sortiert dargestellt.


            Für die Auswahl und Darstellung von Via gelten folgende Regeln:


            •  Können aus Platzgründen nicht alle Via aufgeführt werden, regeln die


            Ausführungsbestimmungen die Wahl der relevantesten Via und allfällig mögliche Kurz- oder

            Teilbezeichnungen. Es ist auch möglich, dass aus Platzgründen gar keine Via aufgeführt

            werden können.


            •  Als Via dürfen nur Haltestellen verwendet werden und keine Regionennamen wie z.B.


            „Vallemaggia“.


            •  Je Haltestelle dürfen nur Via angezeigt werden, die auf dem noch zu fahrenden


            Streckenverlauf liegen. Wenn auf dem Fahrplan eine Perlschnur gezeigt wird, dürfen alle Via

            angezeigt werden, aber nur, wenn klar erkennbar ist, welche bereits zurückgelegt wurden und

            welche noch kommen, zum Beispiel durch Ausgrauen der bereits zurückgelegten Strecke.


            •  Via-Stationen, die von links nach rechts angezeigt werden, sind durch zwei Leerschläge


            voneinander zu trennen (keine Trennzeichen wie «–» oder «,»).

            •  Via-Stationen sind in der Darstellung klar vom Ziel abzugrenzen.

            •  Für die Schreibweise ist der Abschnitt 6.4 zu beachten.'
