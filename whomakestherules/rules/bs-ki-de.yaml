    - id: bs-ki-3
      title: "Fahrtbezogene Inhalte der Kundeninformation"
      groups:
        - id: bs-ki-3.2
          title: "Informationen zur Fahrt"
          controls:
            - id: bs-ki-3.6
              title: "Liniennummer"
              parts:
                - name: statement
                  prose: |
                    Die Liniennummer ist die gegenüber der Kundschaft angezeigte Identifikation einer Linie. Die
                    Liniennummer muss innerhalb einer Region pro Verkehrsmittelkategoriegruppe gemäss 3.5
                    eindeutig sein. Im Fernverkehr muss diese innerhalb der ganzen Schweiz eindeutig sein. Zwei
                    gleiche Liniennummern benachbarter Regionen bzw. Verkehrsmittelkategoriegruppen gemäss 3.5
                    dürfen sich nicht berühren. Die Regionen sind in den Ausführungsbestimmungen geregelt.

                    Die Liniennummer ist je Verkehrsmittelkategorie unterschiedlich aufgebaut (siehe Abschnitt 3.6.3).
                - name: guidance
                  title: "Definition der Linie"
                  prose: |
                    Eine Linie umfasst in der Regel eine sogenannte Stammstrecke – also den Streckenabschnitt, der
                    von den meisten Fahrten dieser Linie befahren wird. Fahrten, die zwar auf derselben
                    Stammstrecke verkehren, aber nicht alle vorgesehenen Zwischenhalte (Via) bedienen, gelten als
                    Fahrtvarianten dieser Linie.

                    Wenn nur ein Teilstück einer solchen Fahrtvariante bedient wird, spricht man von einer Teilstrecke.
                - name: guidance
                  title: "Vergabe der Liniennummer"
                  prose: |
                    Die Liniennummer wird in Abstimmung mit den Transportunternehmen und den Kantonen durch
                    das BAV in der Konzession vergeben.

                    Bei der Angebotsklassifizierung IR und IC wird die Liniennummer in Abstimmung mit den
                    Transportunternehmen und SBB Personenverkehr durch das BAV in der Konzession vergeben.
              props:
