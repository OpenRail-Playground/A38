      - id: bs-ki-3.5-uebersicht
        title: Verkehrsmittelkategorie (Übersicht aller Fahrten der Haltestelle  ("Fahrplan"))
        parts:
        - name: statement
          prose: 'Die Verkehrsmittel werden zu Verkehrsmittelkategorien gebündelt. Gegenüber der Kundschaft

            werden sie in der Regel als Piktogramme kommuniziert. Sie geben Orientierungshilfe auf den

            Kanälen der Kundeninformation und kommen in der Signaletik zum Einsatz.




            Auf eine Unterscheidung zwischen verschiedenen Antriebsarten von Bussen (z.B. Trolleybussen,

            Elektrobussen usw.) wird verzichtet, zumal die Busse auch wechselnd auf der gleichen Linie

            verkehren können. Für weitere Informationen zu den Piktogrammen siehe Abschnitt 6.10.


            In der Schweiz werden folgende Verkehrsmittelkategorien verwendet:


            Verkehrsmittelkategorie Bahn


