    - id: bs-ki-2.6
      title: Infos zu Linien und Tarifzonen
      parts:
      - name: statement
        prose: 'Liniennetzpläne dienen der Orientierung über das konzessionierte Angebot in der Umgebung,

          Zonenpläne helfen zusätzlich dabei, ein korrektes Ticket zu lösen.


          Der Liniennetz- bzw. Zonenplan muss nicht massstabgetreu sein, eine geografische Anlehnung ist

          jedoch zwingend.




          Auf jedem Liniennetz- und Zonenplan müssen ergänzend folgende Informationen und Angaben

          abgebildet werden:


          •  Titel

          •  Zeichenerklärung / Legende

          •  Gültigkeitsdatum (Fahrplanperiode) oder Datum des Datenstandes (gültig ab …)

          •  beim Zonenplan Name oder Logo des Tarif- bzw. Verkehrsverbunds oder der TU


          Die Ausführungsbestimmungen regeln die Details zu den Gestaltungsempfehlungen.


          Liniennetzplan


          Liniennetzpläne bilden das Angebot eines bestimmten Perimeters in einem bestimmten

          Detaillierungsgrad ab. Der Perimeter ist z.B. das Gebiet eines Tarifverbundes oder die ganze

          Schweiz. Der Detaillierungsgrad bestimmt, welche Angebote abgebildet werden, z.B. nur

          Fernverkehr, nur Regionalverkehr oder nur das Nachtnetz. Auf dem Liniennetzplan sind alle

          konzessionierten Angebote sämtlicher TU im gewählten Perimeter und dem gewählten

          Detaillierungsgrad abzubilden.


          Liniennetzpläne stellen das Netz schematisch dar, aber mit einem geografischen Bezug

          (Nordausrichtung, schematische Darstellung von grösseren Gewässern oder Wäldern usw.).


          Zonenplan


          Wenn sich die Haltestelle oder die Fahrt nicht innerhalb eines Tarif- oder Verkehrsverbunds

          befindet, müssen keine Zonenpläne ausgehängt werden.


          Die Tarifzonen müssen klar ersichtlich sein. Das konzessionierte Angebot muss vereinfacht

          mitabgebildet werden, damit sich aus dem Zonenplan ergibt, welche Haltestelle sich in welcher

          Zone befindet.'
